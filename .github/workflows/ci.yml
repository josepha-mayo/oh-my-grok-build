name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            clippy: cargo clippy --workspace --all-targets
            test: cargo test --workspace
          - os: macos-latest
            clippy: cargo clippy --workspace --all-targets
            test: cargo test --workspace
          - os: windows-latest
            # Upstream codegen crates still contain Unix-only tests/examples.
            # Validate the omgb crate (which is intended to be cross-platform).
            clippy: cargo clippy -p oh-my-grok-build --all-targets
            test: cargo test -p oh-my-grok-build
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: ${{ matrix.clippy }}
      - run: ${{ matrix.test }}
